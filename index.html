<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stilla</title>
    <meta name="description" content="A quiet, introverted color palette. Designed to retain expression while staying out of your way." />
    <meta name="author" content="jakeisnt" />
    <meta property="og:title" content="Stilla" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stilla.isnt.online" />
    <meta property="og:description" content="A quiet, introverted color palette. Designed to retain expression while staying out of your way." />
    <meta name="theme-color" content="#121414" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-[#121414] text-[#F2F2F2] font-sans min-h-screen px-6 py-12 sm:px-12">
    <header class="max-w-4xl mx-auto mb-12">
      <h1 class="text-4xl font-semibold tracking-tight">Stilla</h1>
      <p class="mt-2 text-lg text-[#ADB2BA]">A quiet, introverted color palette.</p>
      <p class="mt-1 text-sm text-[#8C8C8C]">
        By <a href="https://jake.isnt.online" class="underline underline-offset-2 hover:text-[#88B6D0] transition-colors">@jakeisnt</a>
      </p>
    </header>

    <main class="max-w-4xl mx-auto space-y-10">
      <section>
        <h2 class="text-sm font-semibold uppercase tracking-widest text-[#8C8C8C] mb-4">Backgrounds</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <div>
            <div class="h-24 rounded-lg bg-[#0D0D0D] ring-1 ring-white/10"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#0D0D0D</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#121414] ring-1 ring-white/10"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#121414</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#1A1C1C] ring-1 ring-white/10"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#1A1C1C</p>
          </div>
        </div>
      </section>

      <section>
        <h2 class="text-sm font-semibold uppercase tracking-widest text-[#8C8C8C] mb-4">Neutrals</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <div>
            <div class="h-24 rounded-lg bg-[#4C566A]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#4C566A</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#8C8C8C]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#8C8C8C</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#ADB2BA]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#ADB2BA</p>
          </div>
        </div>
      </section>

      <section>
        <h2 class="text-sm font-semibold uppercase tracking-widest text-[#8C8C8C] mb-4">Lights</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <div>
            <div class="h-24 rounded-lg bg-[#F2F2F2]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#F2F2F2</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#FAFAFA]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#FAFAFA</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#FAF5EF]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#FAF5EF</p>
          </div>
        </div>
      </section>

      <section>
        <h2 class="text-sm font-semibold uppercase tracking-widest text-[#8C8C8C] mb-4">Accents</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <div>
            <div class="h-24 rounded-lg bg-[#8FBCBB]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#8FBCBB</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#88B6D0]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#88B6D0</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#5E81AC]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#5E81AC</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#BA8082]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#BA8082</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#D99962]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#D99962</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#E9B872]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#E9B872</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#A19C9A]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#A19C9A</p>
          </div>
          <div>
            <div class="h-24 rounded-lg bg-[#CD96B3]"></div>
            <p class="mt-2 text-xs font-mono text-[#8C8C8C]">#CD96B3</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
